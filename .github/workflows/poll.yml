name: Poll Gmail & Run Scheduler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll for new CC'd emails
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://followr-app.vercel.app/api/gmail/poll

      - name: Run sequence scheduler
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://followr-app.vercel.app/api/cron/scheduler
